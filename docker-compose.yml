services:
  backend:
    build: ./backend
    container_name: stl-manager-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/stl-manager.db
      - CACHE_DIR=/data/cache
      - STL_ROOT=/nas
      # SMB mounts don't support inotify — polling is required.
      # Increase CHOKIDAR_INTERVAL (ms) if CPU usage is too high on large libraries.
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=30000
    volumes:
      - ./data:/data
      - ${NAS_MOUNT_PATH:-/mnt/nas}:/nas:ro
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: stl-manager-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
